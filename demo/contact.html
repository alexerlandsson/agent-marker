<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Acme — Contact</title>
</head>
<body>
  <header>
    <h1 id="logo">Acme Inc.</h1>
    <nav>
      <a href="index.html">Home</a> |
      <a href="products.html">Products</a> |
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Contact us</h2>
    <form id="contact-form">
      <p>
        <label>Name<br><input type="text" name="name"></label>
      </p>
      <p>
        <label>Email<br><input type="email" name="email"></label>
      </p>
      <p>
        <label>Message<br><textarea name="message" rows="4"></textarea></label>
      </p>
      <button type="submit" class="submit">Send message</button>
    </form>

    <aside id="office">
      <h3>Our office</h3>
      <address>123 Main St, Springfield</address>
    </aside>
  </main>

  <footer>
    <p>&copy; 2026 Acme Inc.</p>
  </footer>
</body>
</html>
